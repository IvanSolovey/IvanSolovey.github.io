<aside class="artifact">
  <div class="artifact-head">
    <span class="artifact-label">забери з собою</span>
    <span class="artifact-type">{{ page.artifact.type }}</span>
  </div>
  <pre class="artifact-body"><code>{{ page.artifact.content }}</code></pre>
  <div class="artifact-foot">
    <span class="artifact-hint">{{ page.artifact.hint }}</span>
    <button class="artifact-copy" type="button">копіювати</button>
  </div>
</aside>
